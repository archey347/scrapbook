  //   Paddle mode   → comma (dit) and period (dah) as discrete taps.
  // The bindings reattach when keyMode flips so we don't ship space-down events to a paddle
  // handler or vice versa.
  useEffect(() => {
    if (keyMode === 'straight') {
      const onDown = (e) => {
        if (e.code !== 'Space' && e.key !== ' ') return;
        if (e.repeat) return;
        e.preventDefault();
        handlePressDown();
      };
      const onUp = (e) => {
        if (e.code !== 'Space' && e.key !== ' ') return;
        e.preventDefault();
        handlePressUp();
      };
      const onBlur = () => { if (pressDownAtRef.current) handlePressUp(); };
      window.addEventListener('keydown', onDown);
      window.addEventListener('keyup', onUp);
      window.addEventListener('blur', onBlur);
      return () => {
        window.removeEventListener('keydown', onDown);
        window.removeEventListener('keyup', onUp);
        window.removeEventListener('blur', onBlur);
      };
    } else {
      const onDown = (e) => {
        // Match by `.key` rather than `.code` so this works the same on different layouts
        // where comma/period live on different physical keys.
        if (e.key === ',') {
          if (e.repeat) return;
          e.preventDefault();
          handlePaddleTap('.');
        } else if (e.key === '.') {
          if (e.repeat) return;
          e.preventDefault();
          handlePaddleTap('-');
        }
      };
      window.addEventListener('keydown', onDown);
      return () => window.removeEventListener('keydown', onDown);
    }
  }, [keyMode, handlePressDown, handlePressUp, handlePaddleTap]);

  // Display-only convenience for children
  const cur = currentLetter();
  const target = cur?.target || null;
  const targetPattern = cur?.pattern || '';
  const feedback = cur?.feedback || null;

  return (
    <section className="py-10 mb-4 relative">
      <div className="text-center mb-2">
        <div className="text-[11px] uppercase tracking-[0.25em] text-stone-500 font-medium">
          {phaseRef.current === 'transit'
            ? 'Next letter incoming…'
            : 'Send the letter — match the rhythm as it crosses the line'}
        </div>
      </div>

      {/* Target letter */}
      <div className="flex flex-col items-center my-6">
        <div className="display text-7xl font-bold mb-1" style={{
          color: feedback ? (feedback.correct ? '#16a34a' : '#dc2626') : '#1a1a1a'
        }}>
          {target || '·'}
        </div>
        <div className="mono text-sm text-stone-500">
          {target ? renderMorse(MORSE[target]) : ''}
        </div>
      </div>

      {/* Conveyor track */}
      <Conveyor
        letters={letters}
        worldNow={worldNow}
        pressed={pressed}
        currentPressDownWorld={pressDownWorldRef.current}
        unitMs={unitMs}
        hideTarget={hideTarget}
        currentLetterId={cur?.id || 0}
      />

      {/* Key UI — straight key (one press-and-hold button) or paddle (dit + dah taps). Both
          are always enabled; pressing outside the ideal window grades as off-timing in the
          per-shape feedback rather than being swallowed. */}
      <div className="flex flex-col items-center gap-3 mt-6">
        {keyMode === 'straight' ? (
          <>
            <button
              onMouseDown={handlePressDown}
              onMouseUp={handlePressUp}
              onMouseLeave={() => { if (pressed) handlePressUp(); }}
              onTouchStart={(e) => { e.preventDefault(); handlePressDown(); }}
              onTouchEnd={(e) => { e.preventDefault(); handlePressUp(); }}
              className="select-none w-48 h-16 rounded-2xl font-bold text-sm uppercase tracking-[0.3em] transition-all duration-100 shadow-lg hover:shadow-xl"
              style={{
                background: pressed ? '#1a1a1a' : '#fbbf24',
                color: pressed ? '#fbbf24' : '#1a1a1a',
                boxShadow: pressed
                  ? 'inset 0 4px 12px rgba(0,0,0,0.4)'
                  : '0 5px 0 #92400e, 0 7px 14px rgba(0,0,0,0.15)',
                transform: pressed ? 'translateY(3px)' : 'translateY(0)',
              }}
            >
              {pressed ? '— sending —' : 'press & hold'}
            </button>
            <div className="text-xs text-stone-500">
              or hold <kbd className="px-2 py-0.5 mono text-[11px] bg-stone-100 border border-stone-300 rounded">space</kbd>
            </div>
          </>
        ) : (
          <>
            <div className="flex items-center gap-3">
              <button
                onMouseDown={(e) => { e.preventDefault(); handlePaddleTap('.'); }}
                onTouchStart={(e) => { e.preventDefault(); handlePaddleTap('.'); }}
                className="select-none w-24 h-16 rounded-2xl font-bold text-sm uppercase tracking-[0.2em] transition-all duration-75 shadow-lg active:translate-y-1"
                style={{
                  background: '#fbbf24',
                  color: '#1a1a1a',
                  boxShadow: '0 5px 0 #92400e, 0 7px 14px rgba(0,0,0,0.15)',
                }}
              >
                dit ·
              </button>
              <button
                onMouseDown={(e) => { e.preventDefault(); handlePaddleTap('-'); }}
                onTouchStart={(e) => { e.preventDefault(); handlePaddleTap('-'); }}
                className="select-none w-32 h-16 rounded-2xl font-bold text-sm uppercase tracking-[0.2em] transition-all duration-75 shadow-lg active:translate-y-1"
                style={{
                  background: '#fbbf24',
                  color: '#1a1a1a',
                  boxShadow: '0 5px 0 #92400e, 0 7px 14px rgba(0,0,0,0.15)',
                }}
              >
                dah —
              </button>
            </div>
            <div className="text-xs text-stone-500">
              or tap <kbd className="px-2 py-0.5 mono text-[11px] bg-stone-100 border border-stone-300 rounded">,</kbd> for dit · <kbd className="px-2 py-0.5 mono text-[11px] bg-stone-100 border border-stone-300 rounded">.</kbd> for dah
            </div>
          </>
        )}
      </div>

      {/* Feedback summary */}
      {feedback && (
        <div className="mt-6 max-w-xl mx-auto p-4 rounded-2xl fade-in" style={{
          background: feedback.correct ? '#f0fdf4' : '#fef2f2',
          borderColor: feedback.correct ? '#86efac' : '#fca5a5',
          borderWidth: 1, borderStyle: 'solid'
        }}>
          <div className="flex items-center justify-between">
            <div>
              <div className="text-xs uppercase tracking-wider text-stone-500 mb-1">
                {feedback.correct ? 'Correct' : 'Decoded as'}
              </div>
              <div className="display text-2xl font-bold">
                {feedback.decoded}
                <span className="mono text-base text-stone-500 font-medium ml-2">{renderMorse(feedback.decodedPattern || '')}</span>
              </div>
              {!feedback.correct && (
                <div className="text-xs text-stone-600 mt-1">
                  target was <span className="display font-bold">{feedback.target}</span> <span className="mono text-stone-500">{renderMorse(MORSE[feedback.target])}</span>
                </div>
              )}
            </div>
            <div className="text-right">
              <div className="text-xs uppercase tracking-wider text-stone-500 mb-1">Timing</div>
              <div className="display text-2xl font-bold" style={{
                color: feedback.timingScore >= 0.7 ? '#16a34a' :
                       feedback.timingScore >= 0.4 ? '#ca8a04' : '#dc2626'
              }}>
                {Math.round(feedback.timingScore * 100)}%
              </div>
            </div>
          </div>
        </div>
      )}

      {/* History dots */}
      <div className="flex items-center justify-center gap-1.5 mt-6 h-7">
        {history.slice(-10).map((p, i) => (
          <div
            key={i}
            className="w-7 h-7 rounded-md flex items-center justify-center mono text-[11px] font-bold"
            style={{
              background: p.correct ? '#1a1a1a' : '#fef2f2',
              color: p.correct ? '#fff' : '#991b1b',
              border: p.correct ? 'none' : '1px solid #fca5a5',
              opacity: 0.4 + 0.6 * (p.timingScore || 0),
            }}
            title={`${p.target} · ${Math.round((p.timingScore || 0) * 100)}% timing`}
          >
            {p.target}
          </div>
        ))}
      </div>

      <div className="flex items-center justify-center gap-3 mt-4">
        <div className="text-xs text-stone-500 mono">
          {wpm} WPM · 1 unit = {Math.round(unitMs)}ms
        </div>
      </div>
    </section>
  );
}

// The scrolling conveyor view.
// Coordinate model: a single world-units axis that flows leftward as `worldNow` increases.
// Each letter has a `worldStart` such that its shape 0 leading edge is at the strike line
// when `worldNow == worldStart`. Shape s of letter L sits at:
//     screen x = (STRIKE_OFFSET_UNITS + (L.worldStart + s.start) - worldNow) * PX_PER_UNIT
// Presses are stamped at capture time with their world positions (downWorld / upWorld), so
// they render at the same world coordinates as their target shapes. A perfectly-timed press
// for shape s lands at downWorld == L.worldStart + s.start.
function Conveyor({ letters, worldNow, pressed, currentPressDownWorld, unitMs, hideTarget, currentLetterId }) {
  const trackWidthPx = TRACK_WIDTH_UNITS * PX_PER_UNIT;
  const strikeX = STRIKE_OFFSET_UNITS * PX_PER_UNIT;

  const buildShapes = (pat) => {
    const shapes = [];
    let cursor = 0;
    for (let i = 0; i < pat.length; i++) {
      const w = pat[i] === '.' ? 1 : 3;
      shapes.push({ type: pat[i], start: cursor, end: cursor + w, idx: i });
      cursor += w;
      if (i < pat.length - 1) cursor += 1;
    }
    return shapes;
  };

  // World-units → screen-x. Anything outside [0, trackWidthPx] gets clipped by the parent's
  // overflow-hidden so we don't need to filter manually, but we do skip rendering letters
  // whose shapes are all clearly off-screen to save DOM nodes.
  const worldToX = (worldPos) => (STRIKE_OFFSET_UNITS + worldPos - worldNow) * PX_PER_UNIT;

  // Decide per-shape grade from a letter's feedback (post-evaluation only).
  const gradeFor = (letter, shapeIdx) => {
    if (!letter.feedback || !letter.feedback.perShape) return null;
    return letter.feedback.perShape[shapeIdx];
  };

  return (
    <div className="relative mx-auto my-4 select-none" style={{
      width: `${trackWidthPx}px`,
      maxWidth: '100%',
    }}>
      {/* Track background — taller now to fit two lanes side-by-side */}
      <div className="relative h-36 rounded-2xl overflow-hidden" style={{
        background: 'linear-gradient(180deg, #1c1917 0%, #0c0a09 100%)',
        boxShadow: 'inset 0 4px 12px rgba(0,0,0,0.5), inset 0 -2px 6px rgba(0,0,0,0.6)',
      }}>
        {/* Lane stripes for ambience */}
        <div className="absolute inset-0 opacity-10" style={{
          backgroundImage: 'repeating-linear-gradient(90deg, transparent 0, transparent 27px, #fbbf24 27px, #fbbf24 28px)',
        }} />

        {/* Horizontal divider between the two lanes */}
        <div className="absolute inset-x-0 top-1/2 h-px" style={{
          background: 'rgba(255,255,255,0.08)',
        }} />

        {/* Lane labels — small uppercase tags on the far left, vertically centred in each lane.
            'Hidden' tag shows only when the current (latest) letter has hideTarget on and no feedback yet. */}
        {(() => {
          const cur = letters.length > 0 ? letters[letters.length - 1] : null;
          const isHiddenNow = hideTarget && cur && !cur.feedback;
          return (
            <>
              <div className="absolute left-2 top-2 mono text-[8px] tracking-[0.3em] uppercase font-bold pointer-events-none"
                   style={{ color: isHiddenNow ? 'rgba(251,191,36,0.25)' : 'rgba(251,191,36,0.55)' }}>
                target{isHiddenNow ? ' · hidden' : ''}
              </div>
              <div className="absolute left-2 mono text-[8px] tracking-[0.3em] uppercase font-bold pointer-events-none"
                   style={{ color: 'rgba(96,165,250,0.55)', top: 'calc(50% + 6px)' }}>
                yours
              </div>
            </>
          );
        })()}

        {/* TARGET lane — top half. Renders shapes for every letter in the array, positioned in
            world coordinates. Old letters that are scrolling out remain visible; the new letter
            slides in from the right edge. The current letter's shapes are hidden during keying
            if `hideTarget` is on AND the letter has no feedback yet. */}
        <div className="absolute inset-x-0 top-0 h-1/2 flex items-center">
          <div className="relative w-full h-10">
            {letters.flatMap(L => {
              const isCurrent = L.id === currentLetterId;
              // Hide the active letter's target shapes when hideTarget is on and not yet evaluated.
              if (isCurrent && hideTarget && !L.feedback) return [];
              const shapes = buildShapes(L.pattern);
              return shapes.map((s, i) => {
                const x = worldToX(L.worldStart + s.start);
                // Skip shapes far off-screen on either side
                if (x < -200 || x > trackWidthPx + 200) return null;
                const width = (s.end - s.start) * PX_PER_UNIT;
                const grade = gradeFor(L, i);
                let bg = '#fbbf24';
                if (grade) {
                  const iou = grade.iou;
                  bg = iou >= 0.6 ? '#22c55e' : iou >= 0.3 ? '#eab308' : '#ef4444';
                }
                return (
                  <div
                    key={`${L.id}-s${i}`}
                    className="absolute top-1/2 -translate-y-1/2 rounded-full transition-colors"
                    style={{
                      left: `${x}px`,
                      width: `${width}px`,
                      height: '28px',
                      minWidth: '20px',
                      background: bg,
                      boxShadow: `0 0 12px ${bg}80`,
                    }}
                  />
                );
              }).filter(Boolean);
            })}
          </div>
        </div>

        {/* YOURS lane — bottom half. Press intervals from every letter in the array, positioned
            in world coordinates so they align with their target shapes when timing was correct. */}
        <div className="absolute inset-x-0 bottom-0 h-1/2 flex items-center">
          <div className="relative w-full h-10">
            {letters.flatMap(L => {
              return L.presses.map((p, i) => {
                // Press positions were stamped in world coords at capture time. Fall back to
                // tStart-relative math only if downWorld is missing (shouldn't happen post-migration).
                const startWorld = (p.downWorld != null) ? p.downWorld
                  : (L.tStart != null ? L.worldStart + (p.downAt - L.tStart) / unitMs : null);
                const endWorld = (p.upWorld != null) ? p.upWorld
                  : (L.tStart != null ? L.worldStart + (p.upAt - L.tStart) / unitMs : null);
                if (startWorld == null || endWorld == null) return null;
                const x = worldToX(startWorld);
                if (x < -200 || x > trackWidthPx + 200) return null;
                const width = (endWorld - startWorld) * PX_PER_UNIT;
                return (
                  <div
                    key={`${L.id}-p${i}`}
                    className="absolute top-1/2 -translate-y-1/2 rounded-full"
                    style={{
                      left: `${x}px`,
                      width: `${Math.max(4, width)}px`,
                      height: '28px',
                      background: '#60a5fa',
                      opacity: 0.9,
                      boxShadow: '0 0 12px #60a5fa80',
                    }}
                  />
                );
              }).filter(Boolean);
            })}
            {/* Currently-held press for the active letter — left edge anchored at the world
                position where the press started; right edge at worldNow (the strike line). */}
            {(() => {
              if (!currentPressDownWorld) return null;
              const startX = worldToX(currentPressDownWorld);
              const w = Math.max(4, (worldNow - currentPressDownWorld) * PX_PER_UNIT);
              return (
                <div
                  className="absolute top-1/2 -translate-y-1/2 rounded-full"
                  style={{
                    left: `${startX}px`,
                    width: `${w}px`,
                    height: '28px',
                    background: '#60a5fa',
                    opacity: 0.95,
                    boxShadow: '0 0 16px #60a5fa, 0 0 4px #fff inset',
                  }}
                />
              );
            })()}
          </div>
        </div>

        {/* Strike line — full height across both lanes */}
        <div className="absolute top-0 bottom-0 w-0.5 z-10" style={{
          left: `${strikeX}px`,
          background: pressed ? '#fbbf24' : '#fff',
          boxShadow: pressed ? '0 0 16px #fbbf24, 0 0 32px #fbbf2480' : '0 0 8px #ffffff80',
          transition: 'background 60ms, box-shadow 60ms',
        }} />
        <div className="absolute z-10" style={{
          left: `${strikeX - 6}px`,
          top: '-2px',
          width: 0, height: 0,
          borderLeft: '6px solid transparent',
          borderRight: '6px solid transparent',
          borderTop: `8px solid ${pressed ? '#fbbf24' : '#fff'}`,
        }} />

        {/* "NOW" label — anchored next to the strike line */}
        <div className="absolute z-10 mono text-[9px] tracking-[0.3em] uppercase font-bold" style={{
          left: `${strikeX + 6}px`,
          top: '4px',
          color: pressed ? '#fbbf24' : '#a8a29e',
        }}>
          now
        </div>
      </div>

      {/* Legend below the track */}
      <div className="flex items-center justify-between mt-2 px-1 text-[10px] uppercase tracking-wider text-stone-500">
        <div className="flex items-center gap-3">
          <span className="flex items-center gap-1.5">
            <span className="inline-block w-4 h-2 rounded-full" style={{ background: '#fbbf24' }} />
            target
          </span>
          <span className="flex items-center gap-1.5">
            <span className="inline-block w-4 h-2 rounded-full" style={{ background: '#60a5fa' }} />
            yours
          </span>
        </div>
        <div className="mono text-[10px]">{Math.round(unitMs)}ms / unit</div>
      </div>
    </div>
  );
}

function KeyboardPanel({ unlocked, stats, mode }) {
  const letters = INTRO_ORDER;

  const getColor = (c) => {
    if (!unlocked.includes(c)) return { bg: '#f5f5f4', color: '#d6d3d1', border: '#f5f5f4' };
    const samples = stats[c]?.samples;
    if (!samples || samples.length < 2) {
      return { bg: '#fff', color: '#78716c', border: '#e7e5e4' };
    }
    const score = computeKeyScore(samples);
    if (score >= 0.85) return { bg: '#dcfce7', color: '#14532d', border: '#86efac' };
    if (score >= 0.65) return { bg: '#fef3c7', color: '#78350f', border: '#fcd34d' };
    if (score >= 0.4)  return { bg: '#ffedd5', color: '#7c2d12', border: '#fdba74' };
    return { bg: '#fee2e2', color: '#7f1d1d', border: '#fca5a5' };
  };

  return (
    <section className="py-8 border-t border-stone-200">
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-[11px] uppercase tracking-[0.25em] text-stone-500 font-medium">
          Letters · <span className="text-stone-900">{mode === 'send' ? 'send' : 'receive'} progress</span>
        </h3>
        <Legend />
      </div>

      <div className="grid grid-cols-7 sm:grid-cols-9 md:grid-cols-13 gap-1.5">
        {letters.map(c => {
          const { bg, color, border } = getColor(c);
          const samples = stats[c]?.samples;
          const isUnlocked = unlocked.includes(c);
          const correctSamples = samples?.filter(s => s.correct) || [];
          const avgMs = correctSamples.length > 0
            ? Math.round(correctSamples.reduce((a,b) => a+b.ms, 0) / correctSamples.length)
            : null;

          return (
            <div
              key={c}
              className="relative aspect-square rounded-lg border-2 flex flex-col items-center justify-center transition-all hover:scale-105 cursor-default"
              style={{ background: bg, color, borderColor: border }}
              title={isUnlocked ? `${c} — ${MORSE[c]}${avgMs ? ` · ${avgMs}ms` : ''}` : 'Locked'}
            >
              <span className="display text-xl font-bold leading-none">{c}</span>
              <span className="mono text-[8px] mt-0.5 opacity-70 leading-none">{renderMorse(MORSE[c])}</span>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function Legend() {
  const items = [
    { color: '#fee2e2', border: '#fca5a5' },
    { color: '#ffedd5', border: '#fdba74' },
    { color: '#fef3c7', border: '#fcd34d' },
    { color: '#dcfce7', border: '#86efac' },
  ];
  return (
    <div className="flex items-center gap-2">
      <span className="text-[10px] uppercase tracking-wider text-stone-500">slow</span>
      <div className="flex items-center gap-1">
        {items.map((it, i) => (
          <div key={i} className="w-3 h-3 rounded border" style={{ background: it.color, borderColor: it.border }} />
        ))}
      </div>
      <span className="text-[10px] uppercase tracking-wider text-stone-500">fast</span>
    </div>
  );
}

// ---------- PROGRESS BAR ----------
function ProgressBar({ unlocked, stats, mode }) {
  const total = INTRO_ORDER.length;
  const unlockedCount = unlocked.length;

  const scores = unlocked.map(c => computeKeyScore(stats[c]?.samples));
  const avgScore = scores.length ? scores.reduce((a,b) => a+b, 0) / scores.length : 0;

  const totalAttempts = Object.values(stats).reduce((a, s) => a + (s.samples?.length || 0), 0);
  const totalCorrect = Object.values(stats).reduce((a, s) => a + (s.samples?.filter(x => x.correct).length || 0), 0);
  const overallAcc = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;

  return (
    <section className="py-8 border-t border-stone-200">
      <div className="grid grid-cols-3 gap-4">
        <Stat label="Letters Learned" value={`${unlockedCount} / ${total}`} sub={unlockedCount === total ? 'complete' : 'unlocking'} />
        <Stat label="Mastery" value={`${Math.round(avgScore * 100)}%`} sub="avg confidence" />
        <Stat label="Accuracy" value={totalAttempts > 0 ? `${overallAcc}%` : '—'} sub={`${totalAttempts} attempts`} />
      </div>

      <div className="mt-6">
        <div className="flex items-center justify-between text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">
          <span>Progress to next unlock</span>
          <span>{Math.round((avgScore / UNLOCK_AVG_SCORE) * 100)}%</span>
        </div>
        <div className="h-1.5 bg-stone-200 rounded-full overflow-hidden">
          <div
            className="h-full transition-all duration-700 rounded-full"
            style={{
              width: `${Math.min(100, (avgScore / UNLOCK_AVG_SCORE) * 100)}%`,
              background: avgScore >= UNLOCK_AVG_SCORE ? '#16a34a' : '#1a1a1a'
            }}
          />
        </div>
      </div>
    </section>
  );
}

function Stat({ label, value, sub }) {
  return (
    <div className="p-4 rounded-xl bg-stone-50 border border-stone-200">
      <div className="text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-1">{label}</div>
      <div className="display text-3xl font-bold leading-tight">{value}</div>
      <div className="text-xs text-stone-500 mt-1">{sub}</div>
    </div>
  );
}

// ---------- MODAL & PANELS ----------
function Modal({ children, onClose }) {
  useEffect(() => {
    const onEsc = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onEsc);
    return () => window.removeEventListener('keydown', onEsc);
  }, [onClose]);

  return (
    <div
      className="fixed inset-0 z-40 flex items-center justify-center p-4 fade-in"
      style={{ background: 'rgba(0,0,0,0.4)' }}
      onClick={onClose}
    >
      <div
        className="bg-white rounded-2xl max-w-md w-full p-8 shadow-2xl"
        onClick={e => e.stopPropagation()}
      >
        {children}
      </div>
    </div>
  );
}

function SettingsPanel({ wpm, setWpm, muted, toggleMute, wordBreaks, toggleWordBreaks, hideTarget, toggleHideTarget, keyMode, toggleKeyMode, onReset, onClose }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="display text-2xl font-bold">Settings</h2>
        <button onClick={onClose} className="p-1 rounded hover:bg-stone-100"><X size={20} /></button>
      </div>

      <div className="space-y-6">
        <div>
          <div className="flex items-center justify-between mb-2">
            <label className="text-sm font-medium">Goal Speed</label>
            <span className="mono text-sm font-bold">{wpm} WPM</span>
          </div>
          <input
            type="range" min="5" max="30" value={wpm}
            onChange={e => setWpm(parseInt(e.target.value))}
            className="w-full accent-stone-900"
          />
          <div className="flex justify-between text-[10px] uppercase tracking-wider text-stone-500 mt-1">
            <span>Beginner · 5</span><span>Casual · 13</span><span>Fluent · 25+</span>
          </div>
          <p className="text-xs text-stone-500 mt-3 leading-relaxed">
            This is the throughput you're working toward. In Receive mode, individual letters always sound at proper Morse rhythm ({wpm < CHAR_WPM_MIN ? CHAR_WPM_MIN : wpm} WPM character speed) — what changes is the silence between them. Below {CHAR_WPM_MIN} WPM you're using <span className="font-medium">Farnsworth timing</span>: the letters sound fast, the gaps stretch, and as you improve you raise the goal to shorten those gaps.
          </p>
        </div>

        <div className="pt-4 border-t border-stone-200">
          <div className="flex items-center justify-between mb-2">
            <label className="text-sm font-medium">Send key style</label>
            <div className="flex items-center p-0.5 rounded-full bg-stone-100 border border-stone-200">
              <button
                onClick={() => { if (keyMode !== 'straight') toggleKeyMode(); }}
                className={`px-3 py-1 rounded-full text-[10px] font-semibold uppercase tracking-wider transition-all ${
                  keyMode === 'straight' ? 'bg-stone-900 text-white shadow-sm' : 'text-stone-500 hover:text-stone-800'
                }`}
              >
                Straight
              </button>
              <button
                onClick={() => { if (keyMode !== 'paddle') toggleKeyMode(); }}
                className={`px-3 py-1 rounded-full text-[10px] font-semibold uppercase tracking-wider transition-all ${
                  keyMode === 'paddle' ? 'bg-stone-900 text-white shadow-sm' : 'text-stone-500 hover:text-stone-800'
                }`}
              >
                Paddle
              </button>
            </div>
          </div>
          <p className="text-xs text-stone-500 mt-2 leading-relaxed">
            <span className="font-medium">Straight</span> uses one key — hold for a dit, hold longer for a dah. You control duration and spacing, training rhythm and "fist". Use <kbd className="px-1.5 py-0.5 mono text-[10px] bg-stone-100 border border-stone-300 rounded">space</kbd> or the on-screen button.<br /><br />
            <span className="font-medium">Paddle</span> uses two keys — tap <kbd className="px-1.5 py-0.5 mono text-[10px] bg-stone-100 border border-stone-300 rounded">,</kbd> for a dit, tap <kbd className="px-1.5 py-0.5 mono text-[10px] bg-stone-100 border border-stone-300 rounded">.</kbd> for a dah. Each tap emits one perfectly-timed shape at goal speed. Removes timing from the equation so you can focus on which-shape-when. Closer to how serious operators send at speed.
          </p>
        </div>

        <div className="pt-4 border-t border-stone-200">
          <div className="flex items-center justify-between">
            <label className="text-sm font-medium">Word breaks in Receive</label>
            <button
              onClick={toggleWordBreaks}
              className={`px-4 py-1.5 rounded-full text-xs font-medium border ${wordBreaks ? 'bg-stone-900 text-white border-stone-900' : 'bg-stone-100 text-stone-500 border-stone-200'}`}
            >
              {wordBreaks ? 'On' : 'Off'}
            </button>
          </div>
          <p className="text-xs text-stone-500 mt-2 leading-relaxed">
            When on, each batch contains {BATCH_WORD_COUNT} short words separated by longer silences you advance past with <kbd className="px-1.5 py-0.5 mono text-[10px] bg-stone-100 border border-stone-300 rounded">space</kbd>. When off, the same letters play as one continuous stream — useful when you're early in learning and want to focus on letter recognition without the extra cognitive load of catching word boundaries. Takes effect on the next batch.
          </p>
        </div>

        <div className="pt-4 border-t border-stone-200">
          <div className="flex items-center justify-between">
            <label className="text-sm font-medium">Hide target in Send</label>
            <button
              onClick={toggleHideTarget}
              className={`px-4 py-1.5 rounded-full text-xs font-medium border ${hideTarget ? 'bg-stone-900 text-white border-stone-900' : 'bg-stone-100 text-stone-500 border-stone-200'}`}
            >
              {hideTarget ? 'On' : 'Off'}
            </button>
          </div>
          <p className="text-xs text-stone-500 mt-2 leading-relaxed">
            When on, the target lane stays empty while you key — you have to produce the rhythm from memory of the morse pattern shown above the conveyor. As soon as the character finishes, the target appears with grading colours so you can compare it against what you sent. Useful once you no longer need the visual cue and want to practice purely from internalised patterns.
          </p>
        </div>

        <div className="flex items-center justify-between py-3 border-t border-stone-200">
          <label className="text-sm font-medium">Sound</label>
          <button
            onClick={toggleMute}
            className={`px-4 py-1.5 rounded-full text-xs font-medium border ${muted ? 'bg-stone-100 text-stone-500 border-stone-200' : 'bg-stone-900 text-white border-stone-900'}`}
          >
            {muted ? 'Muted' : 'On'}
          </button>
        </div>

        <div className="pt-4 border-t border-stone-200">
          <button
            onClick={onReset}
            className="w-full py-2.5 rounded-lg text-sm text-red-700 border border-red-200 hover:bg-red-50 transition"
          >
            Reset all progress
          </button>
        </div>
      </div>
    </div>
  );
}

function InfoPanel({ onClose }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <h2 className="display text-2xl font-bold">How it works</h2>
        <button onClick={onClose} className="p-1 rounded hover:bg-stone-100"><X size={20} /></button>
      </div>
      <div className="space-y-4 text-sm text-stone-700 leading-relaxed">
        <div>
          <div className="text-xs uppercase tracking-wider text-stone-900 font-bold mb-1">Receive mode</div>
          <p>
            Practice runs in batches of {BATCH_WORD_COUNT} short words. Two flow modes:
          </p>
          <p className="mt-2">
            <span className="font-medium">Step</span> — one letter plays, you type it, the next letter follows. A wrong keypress is recorded and the batch moves on; nothing is replayed (you can press Replay if you want to hear it again on purpose). Word breaks appear as narrower slots — press <kbd className="px-1.5 py-0.5 mono text-[11px] bg-stone-100 border border-stone-300 rounded">space</kbd> to advance past one. Good for first encounters with new letters.
          </p>
          <p className="mt-2">
            <span className="font-medium">Run</span> — the whole batch streams at your goal speed without stopping. Type what you hear into the keyboard, copying behind the audio. Word breaks are inferred — no need to type spaces. Closer to real Morse copy: you can't pause to think, and your typing rhythm becomes part of the practice. Use this once letters feel familiar.
          </p>
          <p className="mt-2">
            After each batch you'll see your accuracy, average reaction time, and how close you got to your goal speed. You start with just <span className="mono font-bold">E</span> (·) and <span className="mono font-bold">T</span> (—); new letters unlock as you build accuracy and speed.
          </p>
        </div>
        <div>
          <div className="text-xs uppercase tracking-wider text-stone-900 font-bold mb-1">Send mode</div>
          <p>
            The conveyor is always flowing. Each target letter slides in from the right and its shapes cross the strike line at goal speed. Two lanes share the same time axis: <span style={{ color: '#a16207' }} className="font-medium">target</span> on top shows the dits and dahs you should send, <span style={{ color: '#1d4ed8' }} className="font-medium">yours</span> below shows what you actually keyed. After each letter the target shapes recolour by timing match — green for good, red for off.
          </p>
          <p className="mt-2">
            <span className="font-medium">Straight key</span> (default) — one button, hold for a dit, hold longer for a dah. You control duration and the inter-element gaps. This trains rhythm — your "fist". The bar in the yours lane grows in real time as you hold; release it before its right edge passes the strike line and you've sent a dit.
          </p>
          <p className="mt-2">
            <span className="font-medium">Paddle</span> — two keys, <kbd className="px-1.5 py-0.5 mono text-[10px] bg-stone-100 border border-stone-300 rounded">,</kbd> for dit, <kbd className="px-1.5 py-0.5 mono text-[10px] bg-stone-100 border border-stone-300 rounded">.</kbd> for dah. Each tap emits one machine-perfect shape; rapid taps queue up with proper inter-element gaps. Removes timing from the equation so you can focus on "which shape, when". Closer to how fast operators send — straight-key rhythm tops out around 15 WPM, paddle keying goes well past 30. Switch in Settings.
          </p>
        </div>
        <p>
          Each mode tracks its own progress. The letters you've unlocked in <span className="font-bold">receive</span> are independent of those in <span className="font-bold">send</span> — recognising a sound by ear is a different skill from keying it out, so they advance separately.
        </p>
        <p>
          The grid below the trainer colours each letter by your current mastery in whichever mode you're in. <span style={{ color: '#7f1d1d' }} className="font-medium">Red</span> means slow or error-prone; <span style={{ color: '#14532d' }} className="font-medium">green</span> means fluent. Switch modes to see the other lane.
        </p>
        <p className="text-stone-500 text-xs pt-3 border-t border-stone-200">
          The WPM slider in settings sets your <span className="font-medium">goal speed</span>. Below {CHAR_WPM_MIN} WPM, letters sound fast and gaps stretch (Farnsworth timing); above, everything plays at goal speed. Start slow, raise it as you get fluent.
        </p>
      </div>
    </div>
  );
}

// ---------- HELPERS ----------
function renderMorse(code) {
  if (!code) return '';
  return code.split('').map(c => c === '.' ? '·' : '—').join(' ');
}

// ---------- MOUNT ----------
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
