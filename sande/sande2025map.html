  html, body { margin:0; height:100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  #map { position:absolute; inset:0; }
  .legend {

    box-shadow:0 1px 4px rgba(0,0,0,.3); font-size:13px; max-width:220px;
  }
  .legend-hd {
    display:flex; align-items:center; justify-content:space-between;
    gap:8px; padding:8px 12px; cursor:pointer; background:#37474f; color:#fff;
    user-select:none; font-weight:600; font-size:13px;
  }
  .legend-hd .chev { transition:transform .15s; font-size:12px; }
  .legend.collapsed .legend-hd .chev { transform:rotate(-90deg); }
  .legend-bd { padding:10px 12px; }
  .legend.collapsed .legend-bd { display:none; }
  .legend-cat + .legend-cat { margin-top:6px; border-top:1px solid #ddd; padding-top:6px; }
  .legend-cat > label { display:flex; align-items:center; gap:6px; font-weight:600; cursor:pointer; margin-bottom:3px; }
  .legend-cat-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
  .legend-cat-hdr label { display:flex; align-items:center; gap:6px; font-weight:600; cursor:pointer; }
  .sel-all-btn { padding:1px 6px; border:1px solid #cfd6e4; border-radius:4px; background:#f6f8fc; cursor:pointer; font-size:11px; color:#445; line-height:1.4; flex-shrink:0; }
  .sel-all-btn:hover { background:#e8edf5; }
  .legend .row { display:flex; align-items:center; gap:8px; margin:2px 0; }
  .legend .row .row-nm { flex:1; }
  .swatch { width:16px; height:4px; border-radius:2px; flex:0 0 auto; }
  .dot { width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.3); flex:0 0 auto; }
  .wp-label {
    background:rgba(255,255,255,.85); border-radius:4px; padding:0 4px;
    font-size:11px; font-weight:600; white-space:nowrap; border:1px solid rgba(0,0,0,.15);
  }
  .sq { width:12px; height:12px; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.3); flex:0 0 auto; }
  .evo-label { background:rgba(255,255,255,.85); border-radius:4px; padding:0 4px; font-size:11px; font-weight:600; white-space:nowrap; border:1px solid rgba(0,0,0,.15); }
  .evo-marker { background:transparent; border:none; }

  /* ---- Navigation panel ---- */
  .nav-panel {
    background:#fff; border-radius:10px; box-shadow:0 1px 6px rgba(0,0,0,.35);
    font-size:13px; width:248px; max-width:82vw; overflow:hidden;
  }
  .nav-panel h4 { margin:0; font-size:14px; }
  .nav-hd {
    display:flex; align-items:center; justify-content:space-between;
    gap:8px; padding:9px 11px; cursor:pointer; background:#2962ff; color:#fff;
    user-select:none;
  }
  .nav-hd .chev { transition:transform .15s; font-size:12px; }
  .nav-panel.collapsed .chev { transform:rotate(-90deg); }
  .nav-bd { padding:10px 11px; max-height:62vh; overflow-y:auto; }
  .nav-panel.collapsed .nav-bd { display:none; }
  .nav-row { margin:7px 0; }
  .nav-hint { color:#667; font-size:11.5px; line-height:1.45; margin:0 0 6px; }
  .seg { display:flex; gap:6px; }
  .seg button {
    flex:1; padding:6px 4px; border:1px solid #cfd6e4; background:#f6f8fc;
    border-radius:7px; cursor:pointer; font-size:13px;
  }
  .seg button.active { background:#2962ff; color:#fff; border-color:#2962ff; }
  .nav-bd label.ck { display:flex; align-items:center; gap:7px; cursor:pointer; }
  .stops { list-style:none; margin:6px 0 0; padding:0; max-height:160px; overflow-y:auto; }
  .stops li {
    display:flex; align-items:center; gap:6px; padding:5px 6px; margin:4px 0;
    background:#f3f5f9; border-radius:7px;
  }
  .stops li .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stops li .idx {
    width:18px; height:18px; border-radius:50%; background:#37474f; color:#fff;

  }
  .stops li button {
    border:none; background:transparent; cursor:pointer; font-size:13px; padding:2px 4px; line-height:1; color:#445;
  }
  .stops li button:hover { color:#000; }
  .stops .empty { color:#889; font-style:italic; padding:4px 2px; }
  .nav-acts { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .nav-acts button {
    flex:1 1 auto; padding:7px 8px; border-radius:7px; border:1px solid #cfd6e4;
    background:#f6f8fc; cursor:pointer; font-size:12.5px; white-space:nowrap;
  }
  #nav-go { background:#1a9850; color:#fff; border-color:#1a9850; font-weight:600; }
  #nav-pick.on { background:#2962ff; color:#fff; border-color:#2962ff; }
  .nav-res { margin-top:9px; font-size:12.5px; line-height:1.5; }
  .nav-res .tot { font-weight:700; font-size:13.5px; }
  .nav-res .leg { color:#445; }
  .nav-res .warn { color:#c62828; }
  .nav-res table { width:100%; border-collapse:collapse; margin-top:4px; }
  .nav-res td { padding:2px 0; vertical-align:top; }
  .nav-res td.r { text-align:right; white-space:nowrap; color:#556; }
  #nav-start { background:#1f2a37; color:#fff; border-color:#1f2a37; font-weight:600; }

  /* ---- Turn-by-turn navigation banner ---- */
  .navbar {
    position:fixed; top:0; left:0; right:0; z-index:1200;
    background:#1f2a37; color:#fff; box-shadow:0 2px 10px rgba(0,0,0,.45);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  .navbar.hidden { display:none; }
  .nb-main { display:flex; align-items:center; gap:12px; padding:10px 14px; }
  .navbar.off .nb-main { background:#b71c1c; }
  .nb-arrow { font-size:32px; line-height:1; width:44px; text-align:center; flex:0 0 auto; }
  .nb-txt { flex:1; min-width:0; }
  .nb-prim { font-size:19px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nb-dist { font-size:14px; color:#cfd8e3; }
  .nb-tools { display:flex; gap:6px; flex:0 0 auto; }
  .nb-tools button {
    background:rgba(255,255,255,.16); color:#fff; border:none; border-radius:8px;
    width:38px; height:38px; font-size:17px; cursor:pointer;
  }
  .nb-tools button:hover { background:rgba(255,255,255,.30); }
  .nb-sub {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:6px 14px; background:#27313d; font-size:13px;

    background:#fff; color:#b71c1c; border:none; border-radius:7px;

  #nb-cancel {
    background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3);

    font-size:12px; display:flex; align-items:center; justify-content:center;
    border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.3);
  }

  .map-search {
    position:fixed; z-index:800;
    top:calc(env(safe-area-inset-top, 0px) + 8px); left:8px; right:8px;

  .map-search.hidden { display:none; }

  .ms-results li.active, .ms-results li:hover { background:#eef4ff; }

  .ms-results .ms-sub { color:#889; font-size:11px; flex:0 0 auto; }
  .ms-results .ms-add { border:none; background:transparent; cursor:pointer; font-size:14px; color:#1a9850; padding:2px 4px; line-height:1; flex:0 0 auto; }
  .ms-results .ms-none { color:#889; font-style:italic; cursor:default; padding:9px 12px; }

  .ms-route { border-top:1px solid #eef0f4; }
  .map-search:not(.show-route) .ms-route { display:none; }

  /* declutter: hide the always-on point labels until zoomed in */
  body.hide-labels .wp-label, body.hide-labels .evo-label { display:none; }

  #btn-centre-me {
    position:fixed; z-index:900;

    width:44px; height:44px; border-radius:50%;
    background:#fff; border:none; box-shadow:0 2px 8px rgba(0,0,0,.3);
    font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  #btn-centre-me:hover { background:#eef1f6; }
  #btn-centre-me:active { background:#dde3f0; }

  /* ---- Centre-pin placement mode ---- */
  #pin-picker { position:fixed; inset:0; z-index:850; pointer-events:none; display:none; }
  #pin-picker.on { display:block; }
  #pin-picker .pp-pin {
    position:absolute; transform:translate(-50%,-100%);
    pointer-events:none; filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));
  }
  #pin-picker .pp-bar {
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom, 0px) + 16px);
    display:flex; align-items:center; gap:8px; pointer-events:auto;
    background:#fff; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.3);
    padding:8px 10px; font-size:13px; max-width:92vw;

  #pin-picker .pp-hint { color:#556; flex:1 1 auto; }
  #pin-picker .pp-bar button {
    padding:8px 14px; border-radius:8px; border:1px solid #cfd6e4;
    background:#f6f8fc; cursor:pointer; font-size:13px; font-weight:600; flex:0 0 auto;
  }
  #pin-picker #pp-ok { background:#1a9850; color:#fff; border-color:#1a9850; }

const map = L.map('map', { zoomControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

// Path styling by category (per the file's legend)
const PATH_STYLE = {
  'driveable':    { color:'#1a9850', weight:4, opacity:0.9 },   // green
  'do-not-drive': { color:'#d73027', weight:4, opacity:0.9 },   // red
  'discretion':   { color:'#555555', weight:3, opacity:0.7, dashArray:'6,5' } // grey
};

const pathsLayer = L.layerGroup();
const allLatLngs = [];
// Index of every named point so the search box can find & jump to it.
const searchIndex = [];

DATA.paths.forEach(p => {
  if (!p.coords || p.coords.length < 2) return;
  const latlngs = p.coords.map(c => [c[0], c[1]]);
  latlngs.forEach(ll => allLatLngs.push(ll));
  const style = PATH_STYLE[p.category] || { color:'#888', weight:2 };
  const geom = p.polygon
    ? L.polygon(latlngs, { ...style, fillOpacity:0.1 })
    : L.polyline(latlngs, style);
  geom.bindPopup(
    `<b>${p.type || p.name || 'Segment'}</b><br/>` +
    `Layer: ${p.layer || '—'}<br/>` +
    `Category: ${p.category}<br/>` +
    `Access: ${p.access || '—'}`
  );
  geom.addTo(pathsLayer);
});
pathsLayer.addTo(map);

// Waypoint markers, coloured by cluster
const wpLayer = L.layerGroup();
DATA.groups.forEach(g => {
  const color = g.color || '#333';
  g.waypoints.forEach(w => {
    allLatLngs.push([w.lat, w.lng]);
    const isHub = /HUB/i.test(w.name);
    const m = L.circleMarker([w.lat, w.lng], {
      radius: isHub ? 8 : 6,
      color: '#fff', weight: 2,
      fillColor: color, fillOpacity: 1
    })
    .bindPopup(`<b>${w.name}</b><br/>Cluster: ${g.name}<br/>${w.lat.toFixed(5)}, ${w.lng.toFixed(5)}<br/><button class="add-stop-btn" data-lat="${w.lat}" data-lng="${w.lng}" data-name="${w.name.replace(/"/g,'&quot;')}">➕ Add as stop</button>`)
    .bindTooltip(w.name.replace(/ .*HUB.*/,'').split(' ')[0], {
      permanent:true, direction:'right', className:'wp-label', offset:[8,0]
    })
    .addTo(wpLayer);
    searchIndex.push({ name:w.name, sub:g.name, lat:w.lat, lng:w.lng, color, marker:m, group:wpLayer, cb:'leg-strategy' });
  });
});
wpLayer.addTo(map);


// --- Evolution checkpoints (square markers => distinct from round strategy checkpoints) ---
const evoLayer = L.layerGroup();
EVO.bounds.forEach(b => {
  if (b.coords && b.coords.length >= 2) {
    b.coords.forEach(ll => allLatLngs.push(ll));
    L.polyline(b.coords, { color:'#4f0e88', weight:3, opacity:0.85 })
      .bindPopup('<b>Evo bounds</b>').addTo(evoLayer);
  }
});
EVO.checkpoints.forEach(c => {
  allLatLngs.push([c.lat, c.lng]);
  const isHub = c.kind === 'Hub';
  const m = L.circleMarker([c.lat, c.lng], {
    radius: isHub ? 8 : 6,
    color: '#fff', weight: 2,
    fillColor: c.color, fillOpacity: 1
  })
    .bindPopup(`<b>Evo ${c.name}</b><br/>${c.kind}<br/>${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}<br/><button class="add-stop-btn" data-lat="${c.lat}" data-lng="${c.lng}" data-name="Evo ${c.name}">➕ Add as stop</button>`)
    .bindTooltip(c.name, { permanent:true, direction:'left', className:'evo-label', offset:[-10,0] })
    .addTo(evoLayer);
  searchIndex.push({ name:'Evo '+c.name, sub:c.kind, lat:c.lat, lng:c.lng, color:c.color, marker:m, group:evoLayer, cb:'leg-evo' });
});
evoLayer.addTo(map);

// Campsite markers
const campsiteLayer = L.layerGroup();
const CAMPSITE = [
  { name:'Campsite', lat:51.735940, lng:-2.027492 }
];
CAMPSITE.forEach(c => {
  allLatLngs.push([c.lat, c.lng]);
  const m = L.marker([c.lat, c.lng], {
    icon: L.divIcon({
      className:'campsite-icon',
      html:'<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">⛺</div>',
      iconSize:[26,26], iconAnchor:[13,13]
    })
  })
  .bindPopup(`<b>${c.name}</b><br/>${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}<br/><button class="add-stop-btn" data-lat="${c.lat}" data-lng="${c.lng}" data-name="${c.name}">➕ Add as stop</button>`)
  .addTo(campsiteLayer);
  searchIndex.push({ name:c.name, sub:'Campsite', lat:c.lat, lng:c.lng, color:'#37474f', icon:'⛺', marker:m, group:campsiteLayer, cb:'leg-campsite' });
});
campsiteLayer.addTo(map);

// Fit to everything
map.fitBounds(L.latLngBounds(allLatLngs), { padding:[30,30] });

// Declutter: the always-on point labels only show once you zoom in,
// so the overview map stays clean (the coloured dots remain visible).
const LABEL_ZOOM = 16;
function updateLabels(){ document.body.classList.toggle('hide-labels', map.getZoom() < LABEL_ZOOM); }
map.on('zoomend', updateLabels);
updateLabels();

// Legend (with per-category visibility toggles and collapse)
const legend = L.control({ position:'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend collapsed');
  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
  let stratRows = DATA.groups.map((g, i) =>
    `<div class="row">`+
      `<span class="dot" style="background:${g.color}"></span>`+
      `<span class="row-nm">${g.name}</span>`+
      `<button class="sel-all-btn" data-gi="${i}">+All</button>`+
    `</div>`
  ).join('');
  div.innerHTML =
    `<div class="legend-hd"><span>📋 ${DATA.event || 'Map'}</span><span class="chev">▾</span></div>`+
    `<div class="legend-bd">`+
      `<div class="legend-cat">`+
        `<label><input type="checkbox" id="leg-roads" checked> Roads</label>`+
        `<div class="row"><span class="swatch" style="background:#1a9850"></span>Driveable (preferred)</div>`+
        `<div class="row"><span class="swatch" style="background:#d73027"></span>Do not drive / no access</div>`+
        `<div class="row"><span class="swatch" style="background:#555;height:0;border-top:3px dashed #555"></span>Use discretion</div>`+
      `</div>`+
      `<div class="legend-cat">`+
        `<label><input type="checkbox" id="leg-strategy" checked> Strategy</label>`+
        stratRows+
      `</div>`+
      `<div class="legend-cat">`+
        `<div class="legend-cat-hdr">`+
          `<label><input type="checkbox" id="leg-evo" checked> Evolution</label>`+
          `<button class="sel-all-btn" id="sel-evo-all">+All</button>`+
        `</div>`+
        `<div class="row"><span class="dot" style="background:#0f9d58"></span>Evo hub</div>`+
        `<div class="row"><span class="dot" style="background:#a61b4a"></span>Evo base</div>`+
      `</div>`+
      `<div class="legend-cat">`+
        `<div class="legend-cat-hdr">`+
          `<label><input type="checkbox" id="leg-campsite" checked> Campsite</label>`+
          `<button class="sel-all-btn" id="sel-camp-all">+All</button>`+
        `</div>`+
        `<div class="row"><span style="font-size:14px;line-height:1">⛺</span>Campsite</div>`+
      `</div>`+
    `</div>`;
  div.querySelector('.legend-hd').addEventListener('click', () => div.classList.toggle('collapsed'));
  div.querySelector('#leg-roads').addEventListener('change', e => {
    e.target.checked ? pathsLayer.addTo(map) : map.removeLayer(pathsLayer);
  });
  div.querySelector('#leg-strategy').addEventListener('change', e => {
    e.target.checked ? wpLayer.addTo(map) : map.removeLayer(wpLayer);
  });
  div.querySelector('#leg-evo').addEventListener('change', e => {
    e.target.checked ? evoLayer.addTo(map) : map.removeLayer(evoLayer);
  });
  div.querySelector('#leg-campsite').addEventListener('change', e => {
    e.target.checked ? campsiteLayer.addTo(map) : map.removeLayer(campsiteLayer);
  });
  div.querySelectorAll('.sel-all-btn[data-gi]').forEach(btn => {
    btn.addEventListener('click', () => {
      const g = DATA.groups[+btn.dataset.gi];
      g.waypoints.forEach(w => window.NAV.addStop(w.lat, w.lng, w.name));
    });
  });
  div.querySelector('#sel-evo-all').addEventListener('click', () => {
    EVO.checkpoints.forEach(c => window.NAV.addStop(c.lat, c.lng, 'Evo ' + c.name));
  });
  div.querySelector('#sel-camp-all').addEventListener('click', () => {
    CAMPSITE.forEach(c => window.NAV.addStop(c.lat, c.lng, c.name));
  });
  return div;
};

/* ============================================================
   Search + directions card (top, Google-style).
   Search any named point (B7, A1 HUB, Evo C5, Campsite) and fly to
   it; the route builder folds into the SAME card — toggle it with
   the 🧭 button, or it opens automatically when you add a stop.
   ============================================================ */
const searchCard = document.createElement('div');
searchCard.className = 'map-search';
searchCard.innerHTML =
  '<div class="ms-row">'+
    '<span class="ms-ico">🔍</span>'+
    '<input id="ms-input" type="search" autocomplete="off" '+
      'placeholder="Search a point, or plan a route…" aria-label="Search map points"/>'+
    '<button id="ms-clear" class="ms-clear" title="Clear" aria-label="Clear search" hidden>✕</button>'+
    '<button id="ms-dir" class="ms-dir" title="Directions" aria-label="Directions"><img src="icon-192.png" alt="Directions"/></button>'+
  '</div>'+
  '<ul id="ms-results" class="ms-results" role="listbox"></ul>'+
  '<div id="ms-route" class="ms-route"></div>';
document.body.appendChild(searchCard);

(function(){
  const input = document.getElementById('ms-input');
  const list  = document.getElementById('ms-results');
  const clr   = document.getElementById('ms-clear');
  let matches = [], active = -1;

  // Bring a point into view: make sure its layer is on, then fly + open popup.
  function focusEntry(e){
    if(!map.hasLayer(e.group)){
      e.group.addTo(map);
      const cb = document.getElementById(e.cb); if(cb) cb.checked = true;
    }
    map.setView([e.lat, e.lng], 18);
    e.marker.openPopup();
  }

  function render(){
    if(!matches.length){ list.innerHTML = ''; return; }
    list.innerHTML = matches.map((m, i) => {
      const mark = m.icon
        ? '<span style="font-size:13px;line-height:1">'+m.icon+'</span>'
        : '<span class="ms-dot" style="background:'+m.color+'"></span>';
      return '<li role="option" data-i="'+m._i+'" class="'+(i===active?'active':'')+'">'+
        mark+'<span class="ms-nm">'+m.name+'</span>'+
        '<span class="ms-sub">'+m.sub+'</span>'+
        '<button class="ms-add" data-i="'+m._i+'" title="Add as stop" aria-label="Add as stop">➕</button>'+
        '</li>';
    }).join('');
  }

  function run(raw){
    const q = (raw || '').trim().toLowerCase();
    clr.hidden = !q;
    if(!q){ matches = []; active = -1; render(); return; }
    const qs = q.replace(/\s+/g, '');
    matches = searchIndex
      .map((e, i) => Object.assign({ _i:i }, e))
      .filter(e => {
        const hay = (e.name + ' ' + e.sub).toLowerCase();
        return hay.includes(q) || hay.replace(/\s+/g, '').includes(qs);
      })
      .slice(0, 8);
    active = matches.length ? 0 : -1;
    if(!matches.length) list.innerHTML = '<li class="ms-none">No matching points</li>';
    else render();
  }

  input.addEventListener('input', e => run(e.target.value));
  input.addEventListener('keydown', e => {
    if(e.key === 'ArrowDown'){ e.preventDefault(); if(matches.length){ active = (active + 1) % matches.length; render(); } }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); if(matches.length){ active = (active - 1 + matches.length) % matches.length; render(); } }
    else if(e.key === 'Enter'){ e.preventDefault(); if(active >= 0 && matches[active]){ focusEntry(searchIndex[matches[active]._i]); input.blur(); } }
    else if(e.key === 'Escape'){ input.value = ''; run(''); input.blur(); }
  });
  list.addEventListener('click', e => {
    const add = e.target.closest('.ms-add');
    if(add){
      e.stopPropagation();
      const en = searchIndex[+add.dataset.i];
      if(window.NAV) window.NAV.addStop(en.lat, en.lng, en.name);
      return;
    }
    const li = e.target.closest('li[data-i]');
    if(li) focusEntry(searchIndex[+li.dataset.i]);
  });
  clr.addEventListener('click', () => { input.value = ''; run(''); input.focus(); });
  document.getElementById('ms-dir').addEventListener('click', () => {
    searchCard.classList.toggle('show-route');
  });
})();

/* ============================================================
   Live location + satnav-style routing over the road network
   - Walking can use every path; driving is restricted to
     `drive:true` segments (excludes red "do-not-drive" roads),
     with an optional "avoid use-discretion" toggle.
   - Multiple stops, shortest path via Dijkstra, optional
     stop-order optimisation (network-distance nearest-neighbour
     + 2-opt) that keeps the start and end points fixed.
   ============================================================ */
(function(){
  /* ---------- geometry helpers ---------- */
  const R = 6371000, toRad = d => d*Math.PI/180;
  function haversine(a,b){
    const dLat=toRad(b.lat-a.lat), dLng=toRad(b.lng-a.lng);
    const la1=toRad(a.lat), la2=toRad(b.lat);
    const h=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(h));
  }
  function projectToSeg(p,a,b){
    const lat0=(a.lat+b.lat)/2*Math.PI/180;
    const mLat=111320, mLng=111320*Math.cos(lat0);
    const bx=(b.lng-a.lng)*mLng, by=(b.lat-a.lat)*mLat;
    const px=(p.lng-a.lng)*mLng, py=(p.lat-a.lat)*mLat;
    const len2=bx*bx+by*by;
    let t = len2>0 ? (px*bx+py*by)/len2 : 0;
    t=Math.max(0,Math.min(1,t));
    const jx=t*bx, jy=t*by, ddx=px-jx, ddy=py-jy;
    return { t, dist:Math.sqrt(ddx*ddx+ddy*ddy),
             lat:a.lat+jy/mLat, lng:a.lng+jx/mLng };
  }

  /* ---------- build routable graph from DATA.paths ---------- */
  const nodes=[], adj=[], edges=[], grid=new Map();
  const CELL=0.00008, SNAP=6, JUNCT=5; // grid cell, 6 m vertex merge, 5 m junction snap
  function getNode(lat,lng){
    const ci=Math.floor(lat/CELL), cj=Math.floor(lng/CELL);
    let best=-1, bestD=SNAP;
    for(let di=-1;di<=1;di++) for(let dj=-1;dj<=1;dj++){
      const arr=grid.get((ci+di)+':'+(cj+dj));
      if(!arr) continue;
      for(const idx of arr){
        const d=haversine({lat,lng}, nodes[idx]);
        if(d<=bestD){ bestD=d; best=idx; }
      }
    }
    if(best>=0) return best;
    const id=nodes.length; nodes.push({lat,lng}); adj.push([]);
    const k=ci+':'+cj; (grid.get(k)||grid.set(k,[]).get(k)).push(id);
    return id;
  }
  function addEdge(a,b,drive,disc){
    if(a===b) return;
    const d=haversine(nodes[a],nodes[b]);
    adj[a].push({to:b,dist:d,drive,disc});
    adj[b].push({to:a,dist:d,drive,disc});
    edges.push({a,b,drive,disc});
  }
  // The source tracks come from a Google My Maps export, where two lines only
  // share a point if they happen to have a vertex at the exact same spot. Where
  // one ride crosses another mid-segment, or a side track meets a ride partway
  // along it, the lines never shared a node — so the router had to detour all
  // the way to the nearest common endpoint, producing big out-and-back loops.
  // Node (planarise) the network first: split every segment wherever another
  // segment crosses it or meets its interior, so the rides connect where they
  // physically touch and become one routable network.
  const raw=[];
  DATA.paths.forEach(p=>{
    if(p.polygon || !p.coords || p.coords.length<2) return; // skip area outlines
    const disc  = p.category==='discretion';
    const drive = p.drive===true && p.category!=='do-not-drive';
    for(let i=1;i<p.coords.length;i++)
      raw.push({ a:p.coords[i-1], b:p.coords[i], drive, disc });
  });

  // local equirectangular projection (metres) for the intersection maths
  const latRef = raw.length ? raw[0].a[0] : 51, D2R = Math.PI/180;
  const MLAT = 111320, MLNG = 111320*Math.cos(latRef*D2R);
  const px = c => [ c[1]*MLNG, c[0]*MLAT ];
  const lerp = (seg,t) => [ seg.a[0]+t*(seg.b[0]-seg.a[0]), seg.a[1]+t*(seg.b[1]-seg.a[1]) ];
  const splits = raw.map(()=>[]); // interior split points {t, c:[lat,lng]} per segment
  const addSplit = (i,t,c) => { if(t>1e-4 && t<1-1e-4) splits[i].push({t,c}); };
  // project metre-point p onto metre-segment m1..m2; record a split where a
  // vertex of one track meets the interior of another within JUNCT metres.
  const tjunc = (i,seg,m1,m2,p) => {
    const bx=m2[0]-m1[0], by=m2[1]-m1[1], len2=bx*bx+by*by;
    if(len2<1e-6) return;
    const t=((p[0]-m1[0])*bx+(p[1]-m1[1])*by)/len2;
    if(t<=1e-4 || t>=1-1e-4) return;
    const dx=(m1[0]+t*bx)-p[0], dy=(m1[1]+t*by)-p[1];
    if(dx*dx+dy*dy > JUNCT*JUNCT) return;
    addSplit(i,t,lerp(seg,t));
  };
  for(let i=0;i<raw.length;i++){
    const a1=px(raw[i].a), a2=px(raw[i].b);
    for(let j=i+1;j<raw.length;j++){
      const b1=px(raw[j].a), b2=px(raw[j].b);
      const rx=a2[0]-a1[0], ry=a2[1]-a1[1], sx=b2[0]-b1[0], sy=b2[1]-b1[1];
      const den=rx*sy-ry*sx;
      if(Math.abs(den)>1e-9){
        const t=((b1[0]-a1[0])*sy-(b1[1]-a1[1])*sx)/den;
        const u=((b1[0]-a1[0])*ry-(b1[1]-a1[1])*rx)/den;
        if(t>1e-4 && t<1-1e-4 && u>1e-4 && u<1-1e-4){ // proper crossing
          const c=lerp(raw[i],t);
          addSplit(i,t,c); addSplit(j,u,c);
          continue;
        }
      }
      // otherwise look for a T-junction (endpoint of one on the other's interior)
      tjunc(i,raw[i],a1,a2,b1); tjunc(i,raw[i],a1,a2,b2);
      tjunc(j,raw[j],b1,b2,a1); tjunc(j,raw[j],b1,b2,a2);
    }
  }
  // emit each track as a chain through its (sorted) split points; getNode merges
  // coincident crossing points and nearby junction points into shared nodes.
  raw.forEach((seg,i)=>{
    const stops=splits[i].slice().sort((x,y)=>x.t-y.t);
    let prev=getNode(seg.a[0],seg.a[1]);
    for(const sp of stops){
      const cur=getNode(sp.c[0],sp.c[1]);
      addEdge(prev,cur,seg.drive,seg.disc); prev=cur;
    }
    addEdge(prev,getNode(seg.b[0],seg.b[1]),seg.drive,seg.disc);
  });

  const allow=(e,mode,avoidDisc)=>
    mode==='drive' ? (e.drive && !(avoidDisc && e.disc)) : true;

  /* ---------- min-heap ---------- */
  class Heap{
    constructor(){this.a=[];}
    size(){return this.a.length;}
    push(k,v){const a=this.a;a.push([k,v]);let i=a.length-1;
      while(i>0){const p=(i-1)>>1;if(a[p][0]<=a[i][0])break;[a[p],a[i]]=[a[i],a[p]];i=p;}}
    pop(){const a=this.a,top=a[0],last=a.pop();
      if(a.length){a[0]=last;let i=0;for(;;){let l=2*i+1,r=l+1,s=i;
        if(l<a.length&&a[l][0]<a[s][0])s=l;if(r<a.length&&a[r][0]<a[s][0])s=r;
        if(s===i)break;[a[s],a[i]]=[a[i],a[s]];i=s;}}return top;}
  }

  /* ---------- snap an arbitrary point onto the allowed network ---------- */
  function snap(pt,mode,avoidDisc){
    let best=null;
    for(const e of edges){
      if(!allow(e,mode,avoidDisc)) continue;
      const pr=projectToSeg(pt,nodes[e.a],nodes[e.b]);
      if(!best||pr.dist<best.dist) best={...pr,e};
    }
    return best;
  }

  /* ---------- overlay temp nodes for the route's points ---------- */
  function overlay(points,mode,avoidDisc){
    const tempCoord=new Map(), extra=new Map();
    const add=(f,t,d,dr,ds)=>{(extra.get(f)||extra.set(f,[]).get(f)).push({to:t,dist:d,drive:dr,disc:ds});};
    let next=nodes.length;
    const ids=points.map(pt=>{
      const id=next++; tempCoord.set(id,{lat:pt.lat,lng:pt.lng});
      const s=snap(pt,mode,avoidDisc);
      let off=Infinity;
      if(s){
        off=s.dist;
        const dP=haversine(pt,{lat:s.lat,lng:s.lng});
        const dA=dP+haversine({lat:s.lat,lng:s.lng},nodes[s.e.a]);
        const dB=dP+haversine({lat:s.lat,lng:s.lng},nodes[s.e.b]);
        add(id,s.e.a,dA,s.e.drive,s.e.disc); add(s.e.a,id,dA,s.e.drive,s.e.disc);
        add(id,s.e.b,dB,s.e.drive,s.e.disc); add(s.e.b,id,dB,s.e.drive,s.e.disc);
      }
      return {id,off};
    });
    return {ids,tempCoord,extra};
  }
  const coordOf=(id,tc)=> id<nodes.length ? nodes[id] : tc.get(id);

  function dijkstra(src,dst,mode,avoidDisc,extra){
    const dist=new Map([[src,0]]), prev=new Map(), h=new Heap(); h.push(0,src);
    while(h.size()){
      const [d,u]=h.pop();
      if(u===dst) break;
      if(d>(dist.get(u)??Infinity)) continue;
      const list=[]; if(u<nodes.length) for(const e of adj[u]) list.push(e);
      const ex=extra.get(u); if(ex) for(const e of ex) list.push(e);
      for(const e of list){
        if(!allow(e,mode,avoidDisc)) continue;
        const nd=d+e.dist;
        if(nd<(dist.get(e.to)??Infinity)){ dist.set(e.to,nd); prev.set(e.to,u); h.push(nd,e.to); }
      }
    }
    if(!dist.has(dst)) return null;
    const path=[]; let c=dst;
    while(c!==undefined){ path.push(c); if(c===src) break; c=prev.get(c); }
    return {dist:dist.get(dst), path:path.reverse()};
  }

  // single-source Dijkstra returning network distances to a set of target
  // node ids; stops as soon as every target has been settled.
  function dijkstraTo(src,targets,mode,avoidDisc,extra){
    const need=new Set(targets); need.delete(src);
    const out=new Map(); if(!need.size) return out;
    const dist=new Map([[src,0]]), h=new Heap(); h.push(0,src);
    while(h.size()){
      const [d,u]=h.pop();
      if(d>(dist.get(u)??Infinity)) continue;
      if(need.has(u)){ out.set(u,d); need.delete(u); if(!need.size) break; }
      const list=[]; if(u<nodes.length) for(const e of adj[u]) list.push(e);
      const ex=extra.get(u); if(ex) for(const e of ex) list.push(e);
      for(const e of list){
        if(!allow(e,mode,avoidDisc)) continue;
        const nd=d+e.dist;
        if(nd<(dist.get(e.to)??Infinity)){ dist.set(e.to,nd); h.push(nd,e.to); }
      }
    }
    return out;
  }

  function route(points,mode,avoidDisc){
    const {ids,tempCoord,extra}=overlay(points,mode,avoidDisc);
    const legs=[]; let total=0, ok=true;
    for(let i=0;i<ids.length-1;i++){
      const r=dijkstra(ids[i].id,ids[i+1].id,mode,avoidDisc,extra);
      if(!r){ ok=false; legs.push(null); continue; }
      total+=r.dist;
      legs.push({dist:r.dist, coords:r.path.map(id=>{const c=coordOf(id,tempCoord);return [c.lat,c.lng];})});
    }
    return {ok,total,legs,offs:ids.map(x=>x.off)};
  }

  // Order stops to minimise total travel, keeping the first point (start)
  // and last point (end) fixed — only the intermediate stops are reordered.
  // Uses real road-network distances (not straight-line). Small instances are
  // solved exactly; larger ones use nearest-neighbour + 2-opt seeded so the
  // result can never be worse than the order the user entered.
  function optimizeOrder(points,mode,avoidDisc){
    const n=points.length;
    if(n<=3) return points.slice(); // 0 or 1 intermediate stop: nothing to reorder

    // network-distance matrix between every pair of points
    const {ids,extra}=overlay(points,mode,avoidDisc);
    const idAt=i=>ids[i].id, allIds=ids.map(x=>x.id);
    const D=Array.from({length:n},()=>Array(n).fill(Infinity));
    for(let i=0;i<n;i++){
      D[i][i]=0;
      const out=dijkstraTo(idAt(i),allIds,mode,avoidDisc,extra);
      for(let j=0;j<n;j++) if(j!==i){
        const d=out.get(idAt(j));
        // fall back to straight-line when no road connects this pair
        D[i][j]= d==null ? haversine(points[i],points[j]) : d;
      }
    }

    const mid=n-2; // number of reorderable (intermediate) stops
    const tourLen=s=>{ let t=0; for(let k=0;k<s.length-1;k++) t+=D[s[k]][s[k+1]]; return t; };

    // Exact search: the small stop counts this map is used with make a full
    // permutation of the intermediate stops cheap and guarantees the optimum.
    if(mid<=7){
      const idx=[]; for(let i=1;i<n-1;i++) idx.push(i);
      let best=null,bestLen=Infinity;
      const perm=(arr,acc)=>{
        if(!arr.length){
          const seq=[0,...acc,n-1], len=tourLen(seq);
          if(len<bestLen){ bestLen=len; best=seq; }
          return;
        }
        for(let k=0;k<arr.length;k++) perm(arr.slice(0,k).concat(arr.slice(k+1)),[...acc,arr[k]]);
      };
      perm(idx,[]);
      return best.map(i=>points[i]);
    }

    // greedy nearest-neighbour over the intermediate stops; `first` pins the
    // first intermediate stop, giving cheap multi-start diversification.
    const greedy=first=>{
      const rem=[]; for(let i=1;i<n-1;i++) if(i!==first) rem.push(i);
      const order=first?[first]:[]; let cur=first||0;
      while(rem.length){
        let bi=0,bd=Infinity;
        for(let k=0;k<rem.length;k++){ const d=D[cur][rem[k]]; if(d<bd){bd=d;bi=k;} }
        cur=rem.splice(bi,1)[0]; order.push(cur);
      }
      return [0,...order,n-1];
    };
    // 2-opt: reverse interior sub-paths while the endpoints stay pinned
    const twoOpt=seq=>{
      let improved=true;
      while(improved){
        improved=false;
        for(let i=1;i<seq.length-2;i++) for(let j=i+1;j<seq.length-1;j++){
          const before=D[seq[i-1]][seq[i]]+D[seq[j]][seq[j+1]];
          const after =D[seq[i-1]][seq[j]]+D[seq[i]][seq[j+1]];
          if(after+1e-9<before){
            for(let lo=i,hi=j;lo<hi;lo++,hi--){ const t=seq[lo]; seq[lo]=seq[hi]; seq[hi]=t; }
            improved=true;
          }
        }
      }
      return seq;
    };

    // Seed 2-opt from the user's own order *and* nearest-neighbour starts, then
    // keep the shortest. Including the input order guarantees we never return a
    // longer route than the one the user already had.
    const seeds=[ Array.from({length:n},(_,i)=>i) ];
    for(let f=1;f<n-1;f++) seeds.push(greedy(f));
    let best=null,bestLen=Infinity;
    for(const s of seeds){
      const seq=twoOpt(s.slice()), len=tourLen(seq);
      if(len<bestLen){ bestLen=len; best=seq; }
    }
    return best.map(i=>points[i]);
  }

  /* ---------- formatting ---------- */
  const fmtD = m => m<950 ? Math.round(m)+' m' : (m/1000).toFixed(2)+' km';
  function fmtT(min){ if(min<1) return '<1 min'; if(min<60) return Math.round(min)+' min';
    const h=Math.floor(min/60), r=Math.round(min%60); return h+' h '+r+' min'; }
  const SPEED={ walk:80, drive:333 }; // metres per minute (≈4.8 / 20 km/h)

  /* ---------- state ---------- */
  const routeLayer=L.layerGroup().addTo(map);
  const state={ mode:'walk', avoidDisc:false, startAtMe:true, optimize:false,
                stops:[], pick:false, userLatLng:null,
                lastRoute:null, nav:null, voice:true };

  /* ---------- live location ---------- */
  let userMarker=null, accCircle=null;
  function onLoc(pos){
    const {latitude:lat,longitude:lng,accuracy}=pos.coords;
    state.userLatLng={lat,lng};
    if(!userMarker){
      userMarker=L.circleMarker([lat,lng],{radius:7,color:'#fff',weight:3,fillColor:'#1976d2',fillOpacity:1})
        .bindPopup('You are here').addTo(map);
      accCircle=L.circle([lat,lng],{radius:accuracy,color:'#1976d2',weight:1,fillColor:'#1976d2',fillOpacity:.12}).addTo(map);
    } else { userMarker.setLatLng([lat,lng]); accCircle.setLatLng([lat,lng]).setRadius(accuracy); }
    const note=document.getElementById('nav-locnote'); if(note) note.textContent='';
    if(state.nav) navUpdate(state.userLatLng);
  }
  function onLocErr(){ const n=document.getElementById('nav-locnote');
    if(n) n.textContent='Location unavailable (permission denied or no GPS).'; }
  if(navigator.geolocation)
    navigator.geolocation.watchPosition(onLoc,onLocErr,{enableHighAccuracy:true,maximumAge:5000,timeout:20000});

  /* ---------- panel ---------- */
  /* ---------- directions panel (folded into the search card) ---------- */
  document.getElementById('ms-route').innerHTML =
    '<div class="nav-bd">'+
      '<p class="nav-hint">Search above, drop a pin, or tap a point → “Add as stop”. Route follows the event roads.</p>'+
      '<div class="nav-row seg" id="nav-mode">'+
        '<button data-mode="walk" class="active">🚶 Walk</button>'+
        '<button data-mode="drive">🚗 Drive</button>'+
      '</div>'+
      '<div class="nav-row" id="nav-avoid-wrap" style="display:none">'+
        '<label class="ck"><input type="checkbox" id="nav-avoid"> Avoid “use-discretion” roads</label>'+
      '</div>'+
      '<div class="nav-row"><label class="ck"><input type="checkbox" id="nav-startme" checked> Start at my location</label>'+
        '<div id="nav-locnote" class="nav-hint" style="margin:2px 0 0"></div></div>'+
      '<div class="nav-row"><label class="ck" title="Reorders the intermediate stops to shorten the trip; the start and final stop stay put."><input type="checkbox" id="nav-opt"> Optimise stop order <span class="nav-hint" style="display:inline">(keeps start &amp; end)</span></label></div>'+
      '<ul class="stops" id="nav-stops"></ul>'+
      '<div class="nav-acts">'+
        '<button id="nav-pick">📍 Pin on map</button>'+
      '</div>'+
      '<div class="nav-acts">'+
        '<button id="nav-go">Route</button>'+
        '<button id="nav-clear">Cancel</button>'+
      '</div>'+
      '<div class="nav-res" id="nav-res"></div>'+
    '</div>';

  const $=id=>document.getElementById(id);
  // mode
  $('nav-mode').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    state.mode=b.dataset.mode;
    [...$('nav-mode').children].forEach(x=>x.classList.toggle('active',x===b));
    $('nav-avoid-wrap').style.display = state.mode==='drive' ? '' : 'none';
  });
  $('nav-avoid').addEventListener('change',e=>state.avoidDisc=e.target.checked);
  $('nav-startme').addEventListener('change',e=>state.startAtMe=e.target.checked);
  $('nav-opt').addEventListener('change',e=>state.optimize=e.target.checked);
  document.getElementById('btn-centre-me').addEventListener('click',()=>{
    if(state.userLatLng) map.setView([state.userLatLng.lat,state.userLatLng.lng],17);
    else onLocErr();
  });
  /* ---------- centre-pin placement overlay ----------
     Instead of tapping a spot, the user enables pick mode, drags the
     MAP so the fixed centre pin sits over the target, then taps OK.
     The pin rests in the middle of the map area that is NOT covered by
     the search/route card at the top. */
  const pinPicker=document.createElement('div');
  pinPicker.id='pin-picker';
  pinPicker.innerHTML=
    '<div class="pp-pin">'+
      '<svg width="34" height="44" viewBox="0 0 24 32" aria-hidden="true">'+
        '<path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z" fill="#2962ff" stroke="#fff" stroke-width="2"/>'+
        '<circle cx="12" cy="12" r="4" fill="#fff"/>'+
      '</svg>'+
    '</div>'+
    '<div class="pp-bar">'+
      '<span class="pp-hint">Drag the map to place the pin</span>'+
      '<button id="pp-cancel">Cancel</button>'+
      '<button id="pp-ok">OK</button>'+
    '</div>';
  document.body.appendChild(pinPicker);
  const pinEl=pinPicker.querySelector('.pp-pin');

  // screen point where the pin tip rests: horizontal centre, and the
  // vertical centre of the map area below the (fixed) search card.
  function pinPoint(){
    const card=document.querySelector('.map-search');
    let top=0;
    if(card && !card.classList.contains('hidden')){
      const r=card.getBoundingClientRect();
      if(r.height) top=r.bottom;
    }
    return { x:window.innerWidth/2, y:top+(window.innerHeight-top)/2 };
  }
  function placePin(){
    const p=pinPoint();
    pinEl.style.left=p.x+'px';
    pinEl.style.top =p.y+'px';
  }
  function setPickMode(on){
    state.pick=on;
    pinPicker.classList.toggle('on',on);
    $('nav-pick').classList.toggle('on',on);
    if(on) placePin();
  }
  $('nav-pick').addEventListener('click',()=>setPickMode(!state.pick));
  $('pp-cancel').addEventListener('click',()=>setPickMode(false));
  $('pp-ok').addEventListener('click',()=>{
    const p=pinPoint();
    const rect=map.getContainer().getBoundingClientRect();
    const ll=map.containerPointToLatLng([p.x-rect.left, p.y-rect.top]);
    addStop(ll.lat,ll.lng,'Dropped pin');
    setPickMode(false);
  });
  window.addEventListener('resize',()=>{ if(state.pick) placePin(); });

  $('nav-clear').addEventListener('click',()=>{ stopNav(); routeLayer.clearLayers(); $('nav-res').innerHTML=''; state.stops.length=0; state.lastRoute=null; setPickMode(false); renderStops(); const card=document.querySelector('.map-search'); if(card) card.classList.remove('show-route'); });

  // stops list
  function renderStops(){
    const ul=$('nav-stops');
    if(!state.stops.length){ ul.innerHTML='<li class="empty">No stops yet.</li>'; return; }
    ul.innerHTML = state.stops.map((s,i)=>
      '<li><span class="idx">'+(i+1)+'</span><span class="nm">'+s.label+'</span>'+
      '<button data-act="up" data-i="'+i+'" title="Move up">▲</button>'+
      '<button data-act="down" data-i="'+i+'" title="Move down">▼</button>'+
      '<button data-act="del" data-i="'+i+'" title="Remove">✕</button></li>').join('');
  }
  $('nav-stops').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    const i=+b.dataset.i, a=b.dataset.act, s=state.stops;
    if(a==='del') s.splice(i,1);
    else if(a==='up'&&i>0) [s[i-1],s[i]]=[s[i],s[i-1]];
    else if(a==='down'&&i<s.length-1) [s[i+1],s[i]]=[s[i],s[i+1]];
    renderStops();
  });
  function addStop(lat,lng,label){
    const last=state.stops[state.stops.length-1];
    if(last && Math.abs(last.lat-lat)<1e-7 && Math.abs(last.lng-lng)<1e-7) return; // ignore back-to-back duplicate (loops elsewhere still allowed)
    state.stops.push({lat,lng,label:label||('Pin '+lat.toFixed(4)+','+lng.toFixed(4))}); renderStops();
    const card=document.querySelector('.map-search'); if(card) card.classList.add('show-route'); // reveal the route panel
  }
  renderStops();

  // add-as-stop buttons inside marker popups
  map.on('popupopen',e=>{
    const btn=e.popup._contentNode && e.popup._contentNode.querySelector('.add-stop-btn');
    if(btn) btn.addEventListener('click',()=>{ addStop(+btn.dataset.lat,+btn.dataset.lng,btn.dataset.name); map.closePopup(); });
  });

  // numbered badge
  function badge(n,role){
    const bg = role==='start' ? '#1976d2' : role==='end' ? '#c62828' : '#37474f';
    return L.divIcon({className:'route-badge',html:'<div style="background:'+bg+'">'+n+'</div>',iconSize:[24,24],iconAnchor:[12,12]});
  }

  /* ---------- compute + draw ---------- */
  $('nav-go').addEventListener('click',()=>{
    const res=$('nav-res');
    const pts=[];
    if(state.startAtMe){
      if(!state.userLatLng){ res.innerHTML='<span class="warn">No location fix yet — uncheck “Start at my location” or wait for GPS.</span>'; return; }
      pts.push({lat:state.userLatLng.lat,lng:state.userLatLng.lng,label:'My location'});
    }
    state.stops.forEach(s=>pts.push(s));
    if(pts.length<2){ res.innerHTML='<span class="warn">Add at least two points (or enable “Start at my location” + one stop).</span>'; return; }

    const ordered = state.optimize ? optimizeOrder(pts, state.mode, state.avoidDisc) : pts;
    const r = route(ordered.map(p=>({lat:p.lat,lng:p.lng})), state.mode, state.avoidDisc);

    const all=drawRoute(ordered,r);
    if(all.length) map.fitBounds(L.latLngBounds(all),routeFitOpts());
    state.lastRoute={ordered,r,mode:state.mode};

    // results
    const spd=SPEED[state.mode];
    let html='<div class="tot">'+(r.ok?'':'⚠ ')+fmtD(r.total)+' · '+fmtT(r.total/spd)+
             ' · '+(state.mode==='drive'?'driving':'walking')+'</div>';
    html+='<table>';
    for(let i=0;i<ordered.length-1;i++){
      const leg=r.legs[i];
      const a=ordered[i].label, b=ordered[i+1].label;
      if(leg) html+='<tr><td>'+(i+1)+'. '+a+' → '+b+'</td><td class="r">'+fmtD(leg.dist)+'<br>'+fmtT(leg.dist/spd)+'</td></tr>';
      else html+='<tr><td class="warn">'+(i+1)+'. '+a+' → '+b+': no '+(state.mode==='drive'?'driveable ':'')+'route found</td><td></td></tr>';
    }
    html+='</table>';
    const far=r.offs.filter(o=>o>120).length;
    if(far) html+='<div class="nav-hint" style="margin-top:5px">Note: '+far+' point(s) are &gt;120 m from any '+(state.mode==='drive'?'driveable ':'')+'road; straight connectors are used to reach the network.</div>';
    if(state.mode==='drive') html+='<div class="nav-hint">Driving avoids red “do-not-drive” roads'+(state.avoidDisc?' and grey discretion roads':'')+'.</div>';
    if(r.ok) html+='<div class="nav-acts" style="margin-top:8px"><button id="nav-start">▶ Start navigation</button></div>';
    res.innerHTML=html;
    const sb=$('nav-start'); if(sb) sb.addEventListener('click',startNav);
  });

  /* =====================================================================
     TURN-BY-TURN NAVIGATION ("satnav" mode)
     Instructions are derived purely from the planned route's geometry —
     the bearing change at each vertex of the polyline — so we get
     left / right / slight / sharp / U-turn guidance without needing any
     street-name data in the road network.
     ===================================================================== */

  // initial compass bearing from point a=[lat,lng] to b=[lat,lng]
  function bearing(a,b){
    const la1=toRad(a[0]), la2=toRad(b[0]), dl=toRad(b[1]-a[1]);
    const y=Math.sin(dl)*Math.cos(la2);
    const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dl);
    return (Math.atan2(y,x)*180/Math.PI+360)%360;
  }

  // fitBounds options that keep the route clear of the search/route card,
  // which is fixed over the top of the map (otherwise the route can hide
  // behind the card — see the directions screenshot).
  function routeFitOpts(){
    const card=document.querySelector('.map-search');
    let top=40;
    if(card && !card.classList.contains('hidden')){
      const cr=card.getBoundingClientRect();
      if(cr.height) top=cr.bottom+16;
    }
    return { paddingTopLeft:[40,top], paddingBottomRight:[40,56] };
  }

  // draw a computed route onto routeLayer; returns all coords for fitBounds
  function drawRoute(ordered,r){
    routeLayer.clearLayers();
    const all=[];
    r.legs.forEach(leg=>{ if(!leg) return;
      L.polyline(leg.coords,{color:'#fff',weight:9,opacity:.9}).addTo(routeLayer);
      L.polyline(leg.coords,{color:'#2962ff',weight:5,opacity:.95}).addTo(routeLayer);
      leg.coords.forEach(c=>all.push(c));
    });
    ordered.forEach((p,i)=>{
      const role = i===0?'start' : i===ordered.length-1?'end' : 'mid';
      L.marker([p.lat,p.lng],{icon:badge(i+1,role),zIndexOffset:1000})
        .bindPopup('<b>'+(i+1)+'. '+p.label+'</b>').addTo(routeLayer);
      all.push([p.lat,p.lng]);
    });
    return all;
  }

  // build the navigation model (flattened path + maneuver list) from a route
  function buildNav(ordered,r,mode){
    const path=[], stopAt=[]; let started=false;
    r.legs.forEach((leg,li)=>{
      if(!leg) return;
      const c=leg.coords;
      if(!started){ path.push(c[0]); stopAt[li]=0; started=true; }
      else stopAt[li]=path.length-1;          // joint = previous leg's end
      for(let i=1;i<c.length;i++) path.push(c[i]);
      stopAt[li+1]=path.length-1;             // end of this leg = ordered[li+1]
    });
    const cum=[0];
    for(let i=1;i<path.length;i++)
      cum[i]=cum[i-1]+haversine({lat:path[i-1][0],lng:path[i-1][1]},{lat:path[i][0],lng:path[i][1]});
    const total=cum[path.length-1]||0;

    // turn maneuvers from bearing changes at interior vertices
    const mans=[];
    for(let i=1;i<path.length-1;i++){
      const inB=bearing(path[i-1],path[i]), outB=bearing(path[i],path[i+1]);
      const d=((outB-inB+540)%360)-180, ad=Math.abs(d);   // + = right, - = left
      if(ad<18) continue;                                 // basically straight
      const side=d>0?'right':'left';
      let type = ad>=160?'uturn' : ad>=125?'sharp' : ad>=40?'turn' : 'slight';
      mans.push({cum:cum[i], type, side, annPrep:false, annNow:false});
    }
    // waypoint (intermediate stop) and final arrival maneuvers
    const stopCum=[];
    for(let k=0;k<ordered.length;k++) stopCum[k]= stopAt[k]!=null ? cum[stopAt[k]] : null;
    for(let k=1;k<ordered.length-1;k++)
      mans.push({cum:stopCum[k], type:'waypoint', label:ordered[k].label, annPrep:false, annNow:false});
    mans.push({cum:total, type:'arrive', label:ordered[ordered.length-1].label, annPrep:false, annNow:false});
    mans.sort((a,b)=>a.cum-b.cum);

    return { path, cum, total, mans, ordered, stopCum, mode,
             midx:0, off:0, offState:false, arrived:false, follow:true };
  }

  function manText(m){
    if(m.type==='arrive')   return 'Arrive at '+m.label;
    if(m.type==='waypoint') return 'Reach '+m.label;
    if(m.type==='uturn')    return 'Make a U-turn';
    const dir = m.side==='right'?'right':'left';
    if(m.type==='sharp')    return 'Sharp '+dir;
    if(m.type==='slight')   return 'Slight '+dir;
    return 'Turn '+dir;
  }
  function manArrow(m){
    if(m.type==='arrive')   return '🏁';
    if(m.type==='waypoint') return '📍';
    if(m.type==='uturn')    return '⮌';
    const right = m.side==='right';
    if(m.type==='slight')   return right?'↗':'↖';
    return right?'➡':'⬅';            // turn & sharp share the glyph; text differs
  }

  // nearest distance-along-route for a point (used by recalculation)
  function projectS(u,nav){
    let best=Infinity,s=0;
    for(let i=0;i<nav.path.length-1;i++){
      const a={lat:nav.path[i][0],lng:nav.path[i][1]}, b={lat:nav.path[i+1][0],lng:nav.path[i+1][1]};
      const pr=projectToSeg(u,a,b);
      if(pr.dist<best){ best=pr.dist; s=nav.cum[i]+pr.t*(nav.cum[i+1]-nav.cum[i]); }
    }
    return s;
  }

  /* ---------- guidance banner ---------- */
  let banner=null, navArrow=null;
  function ensureBanner(){
    if(banner) return;
    banner=document.createElement('div');
    banner.className='navbar hidden';
    banner.innerHTML =
      '<div class="nb-main">'+
        '<div class="nb-arrow">⬆</div>'+
        '<div class="nb-txt"><div class="nb-prim">Navigating…</div><div class="nb-dist"></div></div>'+
        '<div class="nb-tools"><button id="nb-voice" title="Mute / unmute voice">🔊</button>'+
        '<button id="nb-exit" title="Exit navigation">✕</button></div>'+
      '</div>'+
      '<div class="nb-sub"><span id="nb-remain"></span>'+
        '<div style="display:flex;gap:6px">'+
        '<button id="nb-recalc" class="hidden">↻ Recalculate</button>'+
        '<button id="nb-cancel">✕ Cancel navigation</button></div></div>';
    document.body.appendChild(banner);
    banner.querySelector('#nb-exit').addEventListener('click',stopNav);
    banner.querySelector('#nb-cancel').addEventListener('click',stopNav);
    banner.querySelector('#nb-recalc').addEventListener('click',recalc);
    banner.querySelector('#nb-voice').addEventListener('click',e=>{
      state.voice=!state.voice;
      e.target.textContent=state.voice?'🔊':'🔇';
      if(!state.voice){ try{speechSynthesis.cancel();}catch(err){} }
    });
  }
  function setBanner(arrow,prim,dist,sub){
    ensureBanner();
    banner.querySelector('.nb-arrow').textContent=arrow;
    banner.querySelector('.nb-prim').textContent=prim;
    banner.querySelector('.nb-dist').textContent=dist||'';
    if(sub!=null) banner.querySelector('#nb-remain').textContent=sub;
  }
  function showRecalc(on){
    ensureBanner();
    banner.querySelector('#nb-recalc').classList.toggle('hidden',!on);
  }
  function speak(t){
    if(!state.voice || !('speechSynthesis' in window)) return;
    try{ const u=new SpeechSynthesisUtterance(t); u.rate=1; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){}
  }
  function updateArrow(u,brng){
    const html='<div class="nav-cone" style="transform:rotate('+brng+'deg)">▲</div>';
    const icon=L.divIcon({className:'nav-cone-wrap',html,iconSize:[28,28],iconAnchor:[14,14]});
    if(!navArrow) navArrow=L.marker([u.lat,u.lng],{icon,zIndexOffset:1500,interactive:false}).addTo(map);
    else { navArrow.setLatLng([u.lat,u.lng]); navArrow.setIcon(icon); }
  }

  /* ---------- satnav heading-up rotation ----------
     Leaflet 1.9 has no native map bearing, so while navigating we rotate the
     map container itself with a CSS transform so the direction of travel is
     "up". To stop the rotation revealing empty corners the container is grown
     to a centred square the size of the viewport diagonal (tiles then fill it
     after invalidateSize). The Leaflet control layer (legend, attribution) is
     pinned back to the upright viewport rect and given the equal-and-opposite
     rotation about the same centre, so only the map + route turn while the
     controls stay put and the right way up. Exiting restores north-up. */
  let satnavOn=false, mapRotation=0;
  function satnavMetrics(){
    const w=window.innerWidth, h=window.innerHeight;
    const D=Math.ceil(Math.sqrt(w*w+h*h));
    return { D, mx:(D-w)/2, my:(D-h)/2 };
  }
  function layoutSatnav(){
    const el=map.getContainer(), cc=el.querySelector('.leaflet-control-container');
    const {D,mx,my}=satnavMetrics();
    el.style.width=el.style.height=D+'px';
    el.style.left=(-mx)+'px'; el.style.top=(-my)+'px';
    el.style.right='auto'; el.style.bottom='auto';
    el.style.transformOrigin='50% 50%';
    if(cc){
      cc.style.position='absolute';
      cc.style.top=cc.style.bottom=my+'px';
      cc.style.left=cc.style.right=mx+'px';
      cc.style.transformOrigin='50% 50%';
    }
    map.invalidateSize({animate:false});
  }
  function applyRotation(deg){
    mapRotation=deg;
    if(!satnavOn) return;
    const el=map.getContainer(), cc=el.querySelector('.leaflet-control-container');
    el.style.transform='rotate('+deg+'deg)';
    if(cc) cc.style.transform='rotate('+(-deg)+'deg)';
  }
  function enterSatnav(){
    if(satnavOn) return;
    satnavOn=true;
    map.getContainer().style.transition='transform .5s ease-out';
    layoutSatnav();
    applyRotation(mapRotation);
  }
  function exitSatnav(){
    if(!satnavOn) return;
    satnavOn=false; mapRotation=0;
    const el=map.getContainer(), cc=el.querySelector('.leaflet-control-container');
    el.style.transform=''; el.style.transition='';
    el.style.width=el.style.height='';
    el.style.left=el.style.top=el.style.right=el.style.bottom='';
    el.style.transformOrigin='';
    if(cc){
      cc.style.position=''; cc.style.transform=''; cc.style.transformOrigin='';
      cc.style.top=cc.style.bottom=cc.style.left=cc.style.right='';
    }
    map.invalidateSize({animate:false});
  }
  window.addEventListener('resize',()=>{ if(satnavOn){ layoutSatnav(); applyRotation(mapRotation); } });

  /* ---------- start / stop / per-fix update ---------- */
  function startNav(){
    const lr=state.lastRoute;
    if(!lr||!lr.r.ok){ alert('Compute a route first.'); return; }
    if(!state.userLatLng){ alert('No GPS fix yet — wait for your location, then start.'); return; }
    state.nav=buildNav(lr.ordered,lr.r,lr.mode);
    ensureBanner(); banner.classList.remove('hidden','off'); showRecalc(false);
    banner.querySelector('#nb-voice').textContent=state.voice?'🔊':'🔇';
    const np=document.querySelector('.map-search'); if(np) np.classList.add('hidden');
    enterSatnav();                 // rotate map so direction of travel is up
    map.setView([state.userLatLng.lat,state.userLatLng.lng],18);
    speak('Starting navigation');
    navUpdate(state.userLatLng);
  }
  function stopNav(){
    state.nav=null;
    exitSatnav();                  // restore the default north-up orientation
    const np=document.querySelector('.map-search'); if(np) np.classList.remove('hidden');
    if(banner) banner.classList.add('hidden');
    if(navArrow){ map.removeLayer(navArrow); navArrow=null; }
    try{speechSynthesis.cancel();}catch(e){}
  }
  function announce(m,d,mode){
    const TH = mode==='drive'?{prep:170,now:30}:{prep:30,now:8};
    if(!m.annPrep && d<=TH.prep){ m.annPrep=true; speak('In '+fmtD(d)+', '+manText(m).toLowerCase()); }
    if(!m.annNow && d<=TH.now){ m.annNow=true; if(m.type!=='arrive') speak(manText(m)); }
  }
  function navUpdate(u){
    const nav=state.nav; if(!nav||nav.arrived) return;
    // snap to the route polyline
    let best={dist:Infinity,s:0,seg:0};
    for(let i=0;i<nav.path.length-1;i++){
      const a={lat:nav.path[i][0],lng:nav.path[i][1]}, b={lat:nav.path[i+1][0],lng:nav.path[i+1][1]};
      const pr=projectToSeg(u,a,b);
      if(pr.dist<best.dist) best={dist:pr.dist,s:nav.cum[i]+pr.t*(nav.cum[i+1]-nav.cum[i]),seg:i};
    }
    const s=best.s, remain=Math.max(0,nav.total-s);

    if(nav.follow) map.panTo([u.lat,u.lng],{animate:true,duration:.6});
    const travB=bearing(nav.path[best.seg],nav.path[best.seg+1]);
    updateArrow(u,travB);
    // rotate the whole map so the direction of travel points up; the cone is
    // drawn at travB inside the map pane, which the -travB rotation cancels,
    // leaving the position arrow pointing straight up on screen.
    if(satnavOn) applyRotation(-travB);

    // off-route detection (a few consecutive far fixes)
    const OFF = nav.mode==='drive'?55:28;
    if(best.dist>OFF) nav.off++; else nav.off=0;
    if(nav.off>=3 && !nav.offState){ nav.offState=true; banner.classList.add('off'); showRecalc(true); speak('You appear to be off route'); }
    else if(nav.off===0 && nav.offState){ nav.offState=false; banner.classList.remove('off'); showRecalc(false); }

    // drop maneuvers already behind us
    while(nav.midx<nav.mans.length && nav.mans[nav.midx].cum < s-5) nav.midx++;

    // arrival
    const ARR = nav.mode==='drive'?25:12;
    if(remain<=ARR){
      nav.arrived=true;
      setBanner('🏁','You have arrived','','Arrived at '+nav.ordered[nav.ordered.length-1].label);
      speak('You have arrived at '+nav.ordered[nav.ordered.length-1].label);
      setTimeout(stopNav,5000);
      return;
    }

    // what we're heading to right now: the next stop not yet reached
    const last=nav.ordered.length-1; let tk=last;
    for(let k=1;k<nav.ordered.length;k++){ if(nav.stopCum[k]==null || nav.stopCum[k]>s-5){ tk=k; break; } }
    const spd=SPEED[nav.mode];
    const dTarget=Math.max(0,(nav.stopCum[tk]!=null?nav.stopCum[tk]:nav.total)-s);
    let sub='To '+nav.ordered[tk].label+' · '+fmtD(dTarget)+' · '+fmtT(dTarget/spd);
    if(tk!==last) sub+='  (trip '+fmtD(remain)+')';

    const m=nav.mans[nav.midx];
    if(m){
      const d=Math.max(0,m.cum-s);
      setBanner(manArrow(m),manText(m),'in '+fmtD(d),sub);
      announce(m,d,nav.mode);
    } else {
      setBanner('⬆','Continue to destination',fmtD(remain),sub);
    }
  }
  function recalc(){
    const nav=state.nav, u=state.userLatLng; if(!nav||!u) return;
    const s=projectS(u,nav);
    const rem=[];
    for(let k=1;k<nav.ordered.length;k++) if(nav.stopCum[k]==null || nav.stopCum[k]>s-15) rem.push(nav.ordered[k]);
    if(!rem.length) rem.push(nav.ordered[nav.ordered.length-1]);
    const pts=[{lat:u.lat,lng:u.lng,label:'My location'},
               ...rem.map(o=>({lat:o.lat,lng:o.lng,label:o.label}))];
    const r=route(pts.map(p=>({lat:p.lat,lng:p.lng})),nav.mode,state.avoidDisc);
    if(!r.ok){ setBanner('⚠','No route to remaining stops','',''); return; }
    drawRoute(pts,r);
    state.lastRoute={ordered:pts,r,mode:nav.mode};
    state.nav=buildNav(pts,r,nav.mode);
    banner.classList.remove('off'); showRecalc(false);
    speak('Route recalculated'); navUpdate(u);
  }

  // expose for any inline use
  window.NAV={ addStop };
})();
</script>

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>
